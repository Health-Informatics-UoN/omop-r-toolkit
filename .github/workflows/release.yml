# This workflow is used to release the project.
# It is triggered by a push to the main branch.
# It will publish an edge container image
# And run semantic release

name: Release
permissions:
  contents: write
  pull-requests: write
  issues: write
  packages: write
  id-token: write

on:
  push:
    branches:
      - main

jobs:
  # release:
  #   uses: health-informatics-uon/workflows/.github/workflows/semantic-release.yml@1.4.9
  #   with:
  #     node-version: "24"
  #   secrets: inherit

  # publish-container:
  #   uses: health-informatics-uon/workflows/.github/workflows/publish-container.yml@1.4.9
  #   with:
  #     image-name: omop-R-tools
  #     image-description: "Container image for OMOP R tools"
  #     registry: ghcr.io
  #     context: .
  #     dockerfile: ./Dockerfile
  #     platforms: linux/amd64,linux/arm64
  #   secrets: inherit
  #   I've copied in Andy's publish-container workflow, but added caching actions because the R builds are so sloooooow
  publish-container:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    env:
      registry: ghcr.io
      repo_owner: health-informatics-uon
      image-name: omop-R-tools
      image-description: "Container image for OMOP R tools"
      context: .
      dockerfile: ./Dockerfile
      platforms: linux/amd64,linux/arm64
    steps:
      - name: Check out the repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Docker Login
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Metadata action
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index
        with:
          images: ${{ env.registry }}/${{ env.repo_owner }}/${{ env.image-name }}
          tags: |
            type=sha
            ${{ github.sha }}
            type=raw,value={{date 'YYYYMMDDHHmmss[Z]'}}
            edge
          labels: |
            org.opencontainers.image.revision={{sha}}
            org.opencontainers.image.created={{date 'YYYY-MM-DD HH:mm:ss[Z]'}}
          annotations: |
            org.opencontainers.image.description=${{ env.image-description }}

      - name: Build and push Docker images
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ env.context }}
          file: ${{ env.dockerfile }}
          push: true
          platforms: ${{ env.platforms }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          # Pulls the cache from the last 'edge' build
          cache-from: type=registry,ref=${{ env.registry }}/${{ env.repo_owner }}/${{ env.image-name }}:edge
          # Pushes the new inline cache back to the 'edge' image (inline mode=max caches all stages)
          cache-to: type=registry,ref=${{ env.registry }}/${{ env.repo_owner }}/${{ env.image-name }}:edge,mode=max
